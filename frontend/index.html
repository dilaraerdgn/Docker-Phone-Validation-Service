<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Telefon Doğrulama</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:Arial,Helvetica,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;background:#f7f7f7}
    .card{background:white;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);width:360px}
    label{display:block;margin-top:10px}
    input{width:100%;padding:8px;margin-top:6px;border:1px solid #ccc;border-radius:4px}
    button{margin-top:12px;padding:10px 14px;border:none;background:#007bff;color:white;border-radius:6px;cursor:pointer}
    .msg{margin-top:10px;padding:8px;border-radius:4px}
    .success{background:#e6ffed;border:1px solid #28a745;color:#155724}
    .error{background:#ffe6e6;border:1px solid #dc3545;color:#721c24}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{border:1px solid #ddd;padding:6px;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Telefon Kayıt</h2>
    <label>Ad Soyad <input id="name" /></label>
    <label>E-posta <input id="email" type="email" /></label>
    <label>Telefon (6 hane) <input id="phone" maxlength="6" /></label>
    <button id="submit">Gönder</button>
    <div id="msg"></div>

    <h3>Son Kayıtlar (Bonus)</h3>
    <table id="list">
      <thead><tr><th>#</th><th>Ad</th><th>Email</th><th>Telefon</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/script.js"></script>
</body>
</html>
